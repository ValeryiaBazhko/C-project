name: Build and deploy ASP.NET Core + React to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'LibraryManagementSystem1'
  AZURE_WEBAPP_PACKAGE_PATH: './publish'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      # Frontend build (Vite)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build React app
        run: |
          cd frontend
          npm install
          npm run build
          ls -R ../frontend/dist  # Verify build output
          cd ..

      # Backend build (.NET)
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build .NET app
        run: dotnet build --configuration Release

      - name: Publish .NET app
        run: |
          dotnet publish -c Release -o ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          ls -R ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}  # Verify publish folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-react-app
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    environment: Production
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-react-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}  # Recommended auth method

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}  # Alternative auth