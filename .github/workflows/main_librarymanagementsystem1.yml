name: Build and deploy ASP.NET Core app to Azure Web App - LibraryManagementSystem1

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'LibraryManagementSystem1'
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  REACT_APP_API_URL: 'https://librarymanagementsystem1.azurewebsites.net' # Set your production API URL

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      
    steps:
      - uses: actions/checkout@v4

      # Setup Node.js for frontend build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      # Build React frontend with production environment
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build --if-present
          mkdir -p ../Library/wwwroot
          cp -r build/* ../Library/wwwroot/
        env:
          NODE_ENV: production
          REACT_APP_API_URL: ${{ env.REACT_APP_API_URL }}

      # Setup .NET Core
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Restore dependencies
      - name: dotnet restore
        working-directory: ./Library
        run: dotnet restore

      # Build .NET backend
      - name: Build with dotnet
        working-directory: ./Library
        run: dotnet build --configuration Release --no-restore

      # Publish .NET app including frontend files
      - name: dotnet publish
        working-directory: ./Library
        run: dotnet publish -c Release -o ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }} --no-build

      # Upload artifact for deployment
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
      
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: ${{ github.workspace }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}